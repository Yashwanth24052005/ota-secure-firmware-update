name: Sign Firmware on Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Firmware version to sign (manual run)"
        required: true
        default: "0.0.0-manual"

jobs:
  sign-firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine firmware version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify secret is configured
        run: |
          if [ -z "${{ secrets.FIRMWARE_PRIVATE_KEY }}" ]; then
            echo "ERROR: FIRMWARE_PRIVATE_KEY secret is not set in repository settings."
            exit 1
          fi

      - name: Sign firmware
        env:
          FIRMWARE_PRIVATE_KEY: ${{ secrets.FIRMWARE_PRIVATE_KEY }}
        run: |
          python scripts/sign_firmware.py --version "${{ steps.get_version.outputs.version }}" --ci

      - name: Verify signature (sanity check before publishing)
        run: python scripts/verify_firmware.py

      - name: Run test suite
        run: |
          python -m unittest scripts.test_signing_pipeline -v
          python scripts/test_tamper_detection.py

      - name: Upload signed firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-firmware-${{ steps.get_version.outputs.version }}
          path: |
            firmware/dummy_firmware.bin
            firmware/dummy_firmware.sig
            firmware/dummy_firmware.meta.json